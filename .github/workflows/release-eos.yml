name: release-eos
# Builds a Windows .exe with the Epic Online Services plugin bundled, so
# MULTIPLAYER -> QUICK JOIN can reach a public server. Before publishing it
# EXPORTS A REAL BUILD AND RUNS IT to prove the EOS extension actually loads -
# so a build where the plugin didn't get bundled can never ship. Isolated from
# the stable release (separate prerelease tag).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'core/net/**'
      - '.github/workflows/release-eos.yml'
permissions:
  contents: write
concurrency:
  group: release-eos
  cancel-in-progress: true
env:
  GODOT_VERSION: 4.7-stable
  EOS_PLUGIN_TAG: "2.3.0"
  RELEASE_TAG: eos-preview
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          TPLDIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}"
          mkdir -p "$TPLDIR"
          unzip -q templates.tpz
          mv templates/* "$TPLDIR"/

      - name: Fetch and install the EOS plugin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p eos_dl _eos_extract
          gh release download "$EOS_PLUGIN_TAG" --repo 3ddelano/epic-online-services-godot --pattern '*.zip' --dir eos_dl \
            || gh release download "$EOS_PLUGIN_TAG" --repo 3ddelano/epic-online-services-godot --dir eos_dl
          echo "Downloaded:"; ls -la eos_dl
          for z in eos_dl/*.zip; do [ -f "$z" ] && unzip -o -q "$z" -d _eos_extract || true; done
          SRC=$(find _eos_extract -type d -name 'epic-online-services-godot' | head -1)
          echo "Addon folder: '$SRC'"
          if [ -z "$SRC" ]; then echo "::error::EOS addon folder not found"; find _eos_extract -maxdepth 3 -type d; exit 1; fi
          mkdir -p addons
          cp -r "$SRC" addons/
          echo "=== addon contents ==="; ls -la addons/epic-online-services-godot
          echo "=== native libs shipped by the plugin ==="
          find addons/epic-online-services-godot -name '*.so' -o -name '*.dll' -o -name '*.dylib' | sort

      - name: Register the GDExtension for export
        run: |
          set -e
          GDEXT=$(find addons -name '*.gdextension' | head -1)
          echo "gdextension file: $GDEXT"
          if [ -z "$GDEXT" ]; then echo "::error::no .gdextension file in the plugin"; exit 1; fi
          echo "=== .gdextension contents ==="; cat "$GDEXT"
          godot --headless --import 2>&1 | tail -8 || true
          godot --headless --import 2>&1 | tail -8 || true
          mkdir -p .godot
          echo "=== extension_list.cfg after import ==="; cat .godot/extension_list.cfg 2>/dev/null || echo "(missing)"
          # Guarantee the extension is registered for the export regardless of
          # whether headless import wrote it.
          GDEXT_RES="res://${GDEXT}"
          touch .godot/extension_list.cfg
          grep -qxF "$GDEXT_RES" .godot/extension_list.cfg || echo "$GDEXT_RES" >> .godot/extension_list.cfg
          echo "=== extension_list.cfg final ==="; cat .godot/extension_list.cfg

      - name: Verify the extension loads in a REAL exported build
        run: |
          set -e
          # Temporary Linux preset so we can export the game AND run it headless.
          {
            echo ''
            echo '[preset.1]'
            echo 'name="LinuxCheck"'
            echo 'platform="Linux"'
            echo 'runnable=true'
            echo 'dedicated_server=false'
            echo 'export_filter="all_resources"'
            echo 'exclude_filter="docs/*, builds/*, tools/*, data/aircraft_specs.json"'
            echo 'export_path="builds/linux/game.x86_64"'
            echo ''
            echo '[preset.1.options]'
            echo 'binary_format/embed_pck=true'
            echo 'binary_format/architecture="x86_64"'
          } >> export_presets.cfg
          godot --headless --import 2>&1 | tail -5 || true
          mkdir -p builds/linux
          godot --headless --export-release "LinuxCheck" builds/linux/game.x86_64 2>&1 | tail -25
          echo "=== files beside the Linux exe ==="; ls -la builds/linux
          chmod +x builds/linux/game.x86_64
          echo "=== EOSCHECK on the exported build ==="
          ./builds/linux/game.x86_64 --headless -- --eoscheck 2>&1 | tee eoscheck.log || true
          if ! grep -q "plugin_present=true" eoscheck.log; then
            echo "::error::EOS extension did NOT load in the exported build - not publishing"
            exit 1
          fi
          echo "EOS extension confirmed present in the exported build."

      - name: Export Windows (EOS-enabled)
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" builds/windows/StormfighterFlightSim-EOS.exe 2>&1 | tail -25
          echo "Exported files:"; ls -la builds/windows
          test -s builds/windows/StormfighterFlightSim-EOS.exe
          test -f builds/windows/EOSSDK-Win64-Shipping.dll || (echo "::error::EOS SDK dll missing" && exit 1)
          ls builds/windows/libeosg*.dll >/dev/null 2>&1 || (echo "::error::plugin dll missing" && exit 1)
          cd builds/windows
          zip -q -j StormfighterFlightSim-EOS.zip *.exe *.dll
          unzip -l StormfighterFlightSim-EOS.zip

      - name: Publish EOS preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          **EOS multiplayer preview** (Windows) — the same game as the stable release, with Epic Online Services bundled so **MULTIPLAYER → QUICK JOIN** reaches a shared public server (no plugin install, no account, no IP).

          ### Download `StormfighterFlightSim-EOS.zip`, unzip it, and run the .exe **from the unzipped folder** — keep the `.dll` files next to it. (A native plugin can't be a single self-contained .exe; the DLLs must stay beside the game.)

          This build's EOS plugin is verified present by launching an exported build in CI. Hit Quick Join and watch the status line — if it doesn't connect it names the exact step to fix. The stable v1.3.0 single-exe download is unaffected.
          EOF
          gh release delete "$RELEASE_TAG" --yes --cleanup-tag || true
          gh release create "$RELEASE_TAG" builds/windows/StormfighterFlightSim-EOS.zip \
            --title "EOS multiplayer preview" --notes-file notes.md --prerelease
