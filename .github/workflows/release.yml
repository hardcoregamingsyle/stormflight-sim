name: release
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: release
  cancel-in-progress: false
env:
  GODOT_VERSION: 4.7-stable
  GAME_VERSION: v1.3.0
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot and export templates
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          curl -sSL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          TPLDIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION/-/.}"
          mkdir -p "$TPLDIR"
          unzip -q templates.tpz
          mv templates/* "$TPLDIR"/

      - name: Import project
        run: godot --headless --import || true

      # The smoketest boots the real game headless - autoloads, every aircraft
      # + airport build, and a scripted takeoff - and exits 1 on any script
      # error or flight regression. This gates the release: a broken build
      # (blank screen, parse error) never ships.
      - name: Smoketest (headless boot + scripted flight)
        run: timeout 420 godot --headless -- --smoketest

      - name: Export Windows (single self-contained exe)
        run: |
          mkdir -p builds/windows
          godot --headless --export-release "Windows Desktop" builds/windows/StormfighterFlightSim.exe
          ls -la builds/windows

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -f "$GAME_VERSION"
          git push --force origin "refs/tags/${GAME_VERSION}"
          cat > notes.md <<'EOF'
          Windows desktop build. Download **StormfighterFlightSim.exe** below — one self-contained executable, no zip, no install. Windows 11 (x64).

          ## New control scheme
          Every key drives exactly one axis — nothing moves on its own.
          - **W / S** thrust up / down · **A / D** rudder (+ nosewheel steering on the ground)
          - **I / K** pitch · **J / L** bank/roll · **,/.** trim
          - **Q / E** flaps · **U / O** speedbrake · **G** gear · **N** brakes · **B** parking brake
          - **F** reverse thrust (rolling) / pushback (stopped) · **H** engines · **X** autopilot
          - **R** ATC radio · **P** jobs · **M** map · **C** camera

          ## Flight model
          - Fixed the sideslip cross-coupling that made presses feel like the wrong thing happened.
          - Fuel/weight/balance: multi-tank fuel with real mass, live CG + inertia, engine-out imbalance, fuel slosh.
          - Water ditching physics; flipping over on the ground is an instant crash.

          ## Visuals
          - Smoother fuselages, detailed engines and gear, glass terminals, upgraded tower, hangars, fuel farm, a procedural city skyline and tree belts around every major airport.
          EOF
          gh release create "$GAME_VERSION" builds/windows/StormfighterFlightSim.exe \
            --title "Stormfighter Flight Sim ${GAME_VERSION}" \
            --notes-file notes.md \
          || gh release upload "$GAME_VERSION" builds/windows/StormfighterFlightSim.exe --clobber
